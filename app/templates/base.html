<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Ближе — карточки для двоих{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --white: #FFFFFF;
    --beige: #EDE6DA;
    --sand: #D4C8B5;
    --dark: #2A2118;
    --muted: #8C7E72;
    --accent: #A67C52;
    --light-accent: #C9A97A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); font-family: 'Exo 2', sans-serif; color: var(--dark); }
  body.app-mode { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(250,247,242,0.94); backdrop-filter: blur(16px);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  }
  .nav-app {
    position: static;
    background: rgba(250,247,242,0.96); backdrop-filter: blur(16px);
    padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; border-bottom: 1px solid var(--beige);
  }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--dark); text-decoration: none; }
  .logo span { color: var(--accent); }
  .nav-btn {
    font-size: 12px; font-weight: 500; padding: 7px 16px;
    border-radius: 50px; border: 1px solid var(--sand);
    background: transparent; color: var(--dark); cursor: pointer;
    font-family: 'Exo 2', sans-serif; text-decoration: none;
    transition: all 0.2s; display: inline-block;
  }
  .nav-btn:hover { background: var(--dark); color: white; border-color: var(--dark); }
  .nav-back {
    font-size: 12px; font-weight: 400; color: var(--muted);
    padding: 6px 14px; border-radius: 50px; border: 1px solid var(--sand);
    background: transparent; font-family: 'Exo 2', sans-serif;
    text-decoration: none; transition: all 0.2s; display: inline-block;
  }
  .nav-back:hover { background: var(--dark); color: white; border-color: var(--dark); }

  .section { padding: 48px 20px; }
  .section-inner { max-width: 480px; margin: 0 auto; }
  .section-cream { background: var(--cream); }
  .section-beige { background: var(--beige); }
  .section-dark { background: var(--dark); }

  .label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--sand); margin-bottom: 10px; display: block; }
  .label-light { color: rgba(250,247,242,0.5); }
  .h2 { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 500; line-height: 1.15; }
  .h3 { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 500; line-height: 1.2; }
  .body-text { font-size: 14px; font-weight: 300; line-height: 1.75; color: var(--muted); }
  .body-text-light { color: rgba(250,247,242,0.65); }

  .btn-primary {
    display: block; width: 100%; padding: 16px 24px;
    background: var(--dark); color: white; border: none;
    border-radius: 50px; font-family: 'Exo 2', sans-serif;
    font-size: 14px; font-weight: 500; letter-spacing: 0.5px;
    cursor: pointer; text-align: center; text-decoration: none; transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--accent); }
  .btn-accent {
    display: block; width: 100%; padding: 16px 24px;
    background: var(--accent); color: white; border: none;
    border-radius: 50px; font-family: 'Exo 2', sans-serif;
    font-size: 14px; font-weight: 500; letter-spacing: 0.5px;
    cursor: pointer; text-align: center; text-decoration: none; transition: background 0.2s;
  }
  .btn-accent:hover { background: var(--dark); }
  .btn-outline {
    display: block; width: 100%; padding: 16px 24px;
    background: transparent; color: var(--dark);
    border: 1px solid var(--sand); border-radius: 50px;
    font-family: 'Exo 2', sans-serif; font-size: 14px; font-weight: 500;
    letter-spacing: 0.5px; cursor: pointer; text-align: center;
    text-decoration: none; transition: all 0.2s;
  }
  .btn-outline:hover { background: var(--dark); color: white; border-color: var(--dark); }
  .btn-outline-light {
    display: block; width: 100%; padding: 16px 24px;
    background: transparent; color: rgba(250,247,242,0.85);
    border: 1px solid rgba(250,247,242,0.25); border-radius: 50px;
    font-family: 'Exo 2', sans-serif; font-size: 14px; font-weight: 500;
    letter-spacing: 0.5px; cursor: pointer; text-align: center;
    text-decoration: none; transition: all 0.2s;
  }
  .btn-outline-light:hover { background: rgba(250,247,242,0.1); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(42,33,24,0.32);
    z-index: 200; display: none; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--cream); border-radius: 24px 24px 0 0;
    width: 100%; max-height: 78vh; overflow-y: auto;
    padding: 0 24px 40px;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width: 36px; height: 3px; background: var(--sand); border-radius: 2px; margin: 14px auto 20px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--dark); margin-bottom: 14px; }
  .modal-text { font-size: 13px; font-weight: 300; line-height: 1.78; color: var(--muted); }
  .modal-text strong { font-weight: 500; color: var(--dark); }
  .modal-item { margin-bottom: 12px; padding-left: 14px; border-left: 2px solid var(--light-accent); }
  .modal-result { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--beige); font-style: italic; }

  footer { padding: 24px 20px; text-align: center; font-size: 11px; font-weight: 300; color: var(--sand); }
  footer a { color: var(--sand); text-decoration: none; }
</style>
{% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
{% block nav %}
<nav class="nav">
  <a href="/" class="logo">vere<span>very</span></a>
  {% block nav_right %}<a href="/buy" class="nav-btn">Полный доступ</a>{% endblock %}
</nav>
{% endblock %}
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
<script>
function _trackEvent(name, props) {
  try {
    var m = document.cookie.match(/(?:^|;\s*)_vid=([^;]+)/);
    var vid = m ? decodeURIComponent(m[1]) : '';
    var utmStored = null;
    try { utmStored = JSON.parse(localStorage.getItem('_utm') || 'null'); } catch(e) {}
    var utm = (utmStored && utmStored.s && (Date.now() - utmStored.ts) < 7 * 86400000) ? utmStored.s : '';
    var payload = JSON.stringify({event: name, session_id: vid, utm_source: utm, properties: props || {}});
    if (navigator.sendBeacon) {
      navigator.sendBeacon('/api/track-event', new Blob([payload], {type: 'application/json'}));
    } else {
      fetch('/api/track-event', {method:'POST', headers:{'Content-Type':'application/json'}, body:payload, keepalive:true});
    }
  } catch(e) {}
}

(function() {
  function getOrCreateVid() {
    var m = document.cookie.match(/(?:^|;\s*)_vid=([^;]+)/);
    if (m) return decodeURIComponent(m[1]);
    var vid = 'v' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    var exp = new Date(); exp.setDate(exp.getDate() + 30);
    document.cookie = '_vid=' + vid + '; expires=' + exp.toUTCString() + '; path=/; SameSite=Lax';
    return vid;
  }
  var vid = getOrCreateVid();
  var p = new URLSearchParams(window.location.search);
  var utmSource = p.get('utm') || p.get('utm_source') || '';
  var utmMedium = p.get('utm_medium') || '';
  var utmCampaign = p.get('utm_campaign') || '';
  var utmContent = p.get('utm_content') || '';
  if (utmSource) {
    try { localStorage.setItem('_utm', JSON.stringify({s: utmSource, m: utmMedium, c: utmCampaign, n: utmContent, ts: Date.now()})); } catch(e) {}
  }
  var src = utmSource;
  if (!src) {
    try {
      var stored = JSON.parse(localStorage.getItem('_utm') || 'null');
      if (stored && stored.s && (Date.now() - stored.ts) < 7 * 86400000) {
        src = stored.s; utmMedium = stored.m || ''; utmCampaign = stored.c || ''; utmContent = stored.n || '';
      }
    } catch(e) {}
  }
  if (!src) return;
  var payload = JSON.stringify({
    session_id: vid, utm_source: src, utm_medium: utmMedium,
    utm_campaign: utmCampaign, utm_content: utmContent,
    referrer: document.referrer, landing_page: window.location.pathname
  });
  try {
    if (navigator.sendBeacon) {
      navigator.sendBeacon('/api/track-visit', new Blob([payload], {type: 'application/json'}));
    } else {
      fetch('/api/track-visit', {method:'POST', headers:{'Content-Type':'application/json'}, body:payload, keepalive:true});
    }
  } catch(e) {}
})();
</script>
</body>
</html>
