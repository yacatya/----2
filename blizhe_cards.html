<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ближе — карточки для двоих</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --white: #FFFFFF;
    --beige: #EDE6DA;
    --sand: #D4C8B5;
    --dark: #2A2118;
    --muted: #8C7E72;
    --accent: #A67C52;
    --light-accent: #C9A97A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--cream); font-family: 'Exo 2', sans-serif; height: 100vh; display: flex; flex-direction: column; }

  .nav {
    background: rgba(250,247,242,0.96); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; border-bottom: 1px solid var(--beige);
  }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--dark); }
  .logo span { color: var(--accent); }
  .nav-back {
    font-size: 12px; font-weight: 400; color: var(--muted); cursor: pointer;
    padding: 6px 14px; border: 1px solid var(--sand); border-radius: 50px;
    background: transparent; font-family: 'Exo 2', sans-serif; transition: all 0.2s; display: none;
  }
  .nav-back:active { background: var(--dark); color: white; border-color: var(--dark); }

  /* SCREEN 1 */
  .screen-blocks { flex: 1; overflow-y: auto; padding: 28px 20px 32px; display: flex; flex-direction: column; }
  .label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--sand); margin-bottom: 8px; }
  .screen-title { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 500; line-height: 1.15; color: var(--dark); margin-bottom: 6px; }
  .screen-sub { font-size: 13px; font-weight: 300; color: var(--muted); line-height: 1.65; margin-bottom: 32px; }
  .block-cards { display: flex; flex-direction: column; gap: 12px; }
  .block-card {
    background: var(--white); border: 1px solid var(--beige); border-radius: 20px;
    padding: 20px 18px; cursor: pointer; display: flex; align-items: center;
    justify-content: space-between; box-shadow: 0 2px 16px rgba(42,33,24,0.05); transition: transform 0.15s;
  }
  .block-card:active { transform: scale(0.98); }
  .block-left { display: flex; align-items: center; gap: 14px; }
  .block-marker { width: 6px; height: 36px; border-radius: 3px; flex-shrink: 0; }
  .marker-action { background: var(--accent); }
  .marker-question { background: var(--muted); }
  .marker-care { background: var(--light-accent); }
  .block-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--dark); }
  .screen-title em { color: var(--accent); font-style: italic; }
  .block-arrow { color: var(--sand); font-size: 22px; }

  /* SCREEN 2 */
  .screen-card { flex: 1; display: none; flex-direction: column; overflow: hidden; position: relative; }
  .swipe-container { flex: 1; overflow: hidden; position: relative; padding: 20px 20px 0; }
  .cards-track { display: flex; height: 100%; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
  .card-slide { min-width: 100%; height: 100%; display: flex; flex-direction: column; }
  .card-block-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .card-block-dot { width: 20px; height: 4px; border-radius: 2px; display: inline-block; }
  .card-main {
    background: var(--white); border: 1px solid var(--beige); border-radius: 24px;
    padding: 26px 22px; box-shadow: 0 2px 24px rgba(42,33,24,0.07);
    flex: 1; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden;
  }
  .card-level { font-size: 10px; font-weight: 400; color: var(--sand); margin-bottom: 16px; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 7px; }
  .level-pip { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .level-easy { background: var(--light-accent); }
  .level-medium { background: var(--accent); }
  .level-deep { background: var(--dark); }
  .card-text { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 500; line-height: 1.42; color: var(--dark); flex: 1; display: flex; align-items: center; }
  .card-hint { font-size: 12px; font-weight: 300; color: var(--muted); font-style: italic; line-height: 1.65; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--beige); }
  .card-num { position: absolute; bottom: 18px; right: 20px; font-size: 11px; font-weight: 300; color: var(--sand); letter-spacing: 1px; }

  .nav-dots { display: flex; justify-content: center; gap: 5px; padding: 14px 0 6px; flex-shrink: 0; }
  .dot { height: 6px; border-radius: 3px; background: var(--sand); transition: all 0.3s; width: 6px; }
  .dot.active { width: 20px; background: var(--dark); }

  .swipe-hint { text-align: center; font-size: 10px; font-weight: 300; color: var(--sand); padding-bottom: 6px; flex-shrink: 0; letter-spacing: 1px; text-transform: uppercase; }

  .info-buttons { display: none; gap: 8px; padding: 8px 20px 18px; background: var(--cream); flex-shrink: 0; }
  .btn-info {
    flex: 1; padding: 11px 4px; border-radius: 50px; border: 1px solid var(--sand);
    background: transparent; font-family: 'Exo 2', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.3px; color: var(--dark); cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .btn-info.active { background: var(--dark); color: white; border-color: var(--dark); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(42,33,24,0.32); z-index: 200; display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--cream); border-radius: 24px 24px 0 0; width: 100%;
    max-height: 78vh; overflow-y: auto; padding: 0 24px 40px;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width: 36px; height: 3px; background: var(--sand); border-radius: 2px; margin: 14px auto 20px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--dark); margin-bottom: 14px; }
  .modal-text { font-size: 13px; font-weight: 300; line-height: 1.78; color: var(--muted); }
  .modal-text strong { font-weight: 500; color: var(--dark); }
  .modal-item { margin-bottom: 12px; padding-left: 14px; border-left: 2px solid var(--light-accent); }
  .modal-section { margin-bottom: 10px; }
  .modal-result { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--beige); font-style: italic; }
</style>
</head>
<body>

<div class="nav">
  <div class="logo">vere<span>very</span></div>
  <button class="nav-back" id="btn-back" onclick="showBlocks()">← Блоки</button>
</div>

<div class="screen-blocks" id="screen-blocks">
  <div class="label">Начни с одной карточки в день</div>
  <div class="screen-title">Колода для <em>пар</em></div>
  <div class="screen-sub">Выберите блок — и листайте карточки свайпом</div>
  <div class="block-cards">
    <div class="block-card" onclick="showCards('action')">
      <div class="block-left"><div class="block-marker marker-action"></div><div><div class="block-name">Действие</div><div class="block-count">20 карточек</div></div></div>
      <div class="block-arrow">›</div>
    </div>
    <div class="block-card" onclick="showCards('question')">
      <div class="block-left"><div class="block-marker marker-question"></div><div><div class="block-name">Вопрос</div><div class="block-count">20 карточек</div></div></div>
      <div class="block-arrow">›</div>
    </div>
    <div class="block-card" onclick="showCards('care')">
      <div class="block-left"><div class="block-marker marker-care"></div><div><div class="block-name">Забота</div><div class="block-count">20 карточек</div></div></div>
      <div class="block-arrow">›</div>
    </div>
  </div>
</div>

<div class="screen-card" id="screen-card">
  <div class="swipe-container" id="swipe-container">
    <div class="cards-track" id="cards-track"></div>
  </div>
  <div class="nav-dots" id="nav-dots"></div>
  <div class="swipe-hint">← свайп →</div>
  <div class="info-buttons" id="info-buttons">
    <button class="btn-info" onclick="openModal('why',this)">Зачем это</button>
    <button class="btn-info" onclick="openModal('brain',this)">Мозг</button>
    <button class="btn-info" onclick="openModal('science',this)">Наука</button>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-text" id="modal-body"></div>
  </div>
</div>

<script>
const blocks = {
  action: {
    label: 'ДЕЙСТВИЕ',
    color: 'var(--accent)',
    cards: [
      { level:'Средний', text:'Предложите партнёру 20–30 минут пешей прогулки. Телефоны — дома или в кармане на беззвучном. Маршрут не важен. Можно молчать. Можно говорить. Просто идите рядом.', hint:'',
        why:'Совместное движение в одном направлении — это метафора и физиология одновременно. Разговор во время ходьбы психологически безопаснее, чем «лицом к лицу» — нет прямого взгляда, нет ощущения допроса.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — физическая активность запускает выброс, создавая фоновое удовольствие и открытость</div><div class="modal-item"><strong>Кортизол</strong> — снижается при ходьбе, особенно на улице</div><div class="modal-item"><strong>Окситоцин</strong> — синхронное движение и случайные прикосновения активируют систему привязанности</div>',
        science:'<div class="modal-section"><strong>Терапия принятия и ответственности:</strong> действие в соответствии с ценностями (близость) даже при отсутствии «настроения» — путь к восстановлению контакта.</div><div class="modal-section"><strong>Нейробиология:</strong> двустороннее движение тела снижает активность миндалины — центра тревоги. Этот принцип лежит в основе метода десенсибилизации и переработки движением глаз.</div><div class="modal-result">Снижение тревожности и защитных реакций у обоих. Часто именно во время прогулок пары впервые за долгое время начинают говорить — не о проблемах, а о простом.</div>'},
      { level:'Лёгкий', text:'Напишите партнёру короткую записку от руки — одно предложение. Положите туда, где он найдёт её в течение дня: в карман, в сумку, рядом с кофе. Не предупреждайте.', hint:'',
        why:'Неожиданный знак внимания разрывает паттерн «невидимости», который накапливается в рутине. Записка говорит: «я думал(а) о тебе, когда тебя не было рядом» — это один из самых сильных сигналов привязанности.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — неожиданное приятное событие даёт более сильный выброс, чем ожидаемое</div><div class="modal-item"><strong>Окситоцин</strong> — активируется через осознание заботы и внимания</div><div class="modal-item"><strong>Серотонин</strong> — ощущение значимости и «меня видят» стабилизирует эмоциональный фон</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> «биды для контакта» — малые жесты внимания — главный строительный материал доверия.</div><div class="modal-section"><strong>Позитивная психология (Селигман):</strong> неожиданные акты доброты имеют более длительный эффект, чем запланированные.</div><div class="modal-result">Партнёр чувствует себя замеченным и важным. Создаёт положительный эмоциональный след на весь день.</div>'},
      { level:'Лёгкий', text:'Принесите партнёру один цветок — не букет, не к празднику. Просто так. Можно полевой, можно из магазина у дома. Скажите: «Просто подумал(а) о тебе».', hint:'',
        why:'Подарок «без повода» — самый чистый сигнал: «ты в моих мыслях не потому что надо, а потому что хочу». Именно отсутствие повода делает жест особенно ценным — он не обязательный, значит, искренний.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — получатель испытывает всплеск от неожиданного позитивного внимания</div><div class="modal-item"><strong>Окситоцин</strong> — выброс при осознании заботы и выбора</div><div class="modal-item"><strong>Миндалина</strong> — снижает активность при получении символических знаков принятия</div>',
        science:'<div class="modal-section"><strong>Теория привязанности Боулби:</strong> символические жесты заботы активируют систему безопасной базы.</div><div class="modal-section"><strong>Когнитивно-поведенческая терапия:</strong> разрушение паттерна «меня не замечают» через конкретные поведенческие события.</div><div class="modal-result">Сдвиг внутреннего нарратива от «я не важен(на)» к «обо мне думают». Один цветок может изменить эмоциональный климат вечера.</div>'},
      { level:'Лёгкий', text:'Завтра утром — первое, что вы делаете, проснувшись, это не телефон. Это взгляд на партнёра. Скажите что-нибудь простое: «Доброе утро». Обнимите. Улыбнитесь. Дайте первую минуту дня — ему.', hint:'',
        why:'Первые минуты после пробуждения — время максимальной нейропластичности. То, что мозг получает в эти минуты, задаёт эмоциональный тон всего дня. Выбрать партнёра вместо экрана — это приоритет, выраженный действием.',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — утренний контакт запускает его выброс, создавая ощущение связи на весь день</div><div class="modal-item"><strong>Кортизол</strong> — утренний пик смягчается присутствием близкого</div><div class="modal-item"><strong>Дофамин</strong> — позитивный первый опыт дня формирует ожидания и настроение</div>',
        science:'<div class="modal-section"><strong>Нейробиология пробуждения:</strong> утренний кортизоловый пик напрямую зависит от ощущения безопасности при пробуждении.</div><div class="modal-section"><strong>Готтман:</strong> ритуалы воссоединения и разлучения — ключевые маркеры здоровья отношений.</div><div class="modal-result">Оба партнёра начинают день с ощущением связи. Постепенно утро перестаёт быть «параллельным» и становится совместным.</div>'},
      { level:'Средний', text:'Напишите на бумаге пять конкретных вещей, которые вы цените в партнёре — не общих («ты хороший»), а конкретных («ты умеешь слушать, когда мне плохо»). Прочитайте вслух. Не торопитесь.', hint:'',
        why:'В кризисе мозг автоматически фокусируется на негативном — это эволюционный механизм выживания. Намеренный поиск позитивного разрывает этот цикл. Каждая конкретная деталь говорит партнёру: «тебя видят, а не просто терпят».',
        brain:'<div class="modal-item"><strong>Серотонин</strong> — выброс при переживании благодарности у говорящего и признания у слушающего</div><div class="modal-item"><strong>Дофамин</strong> — конкретные детали активируют систему вознаграждения сильнее, чем общие слова</div><div class="modal-item"><strong>Префронтальная кора</strong> — упражнение на поиск позитивного тренирует нейронные пути оптимизма</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> соотношение 5:1 (пять позитивных взаимодействий на одно негативное) — главный предиктор стабильности пары.</div><div class="modal-section"><strong>Позитивная психология (Селигман):</strong> практики благодарности снижают депрессивность и улучшают качество отношений.</div><div class="modal-result">Партнёр чувствует себя увиденным и ценным. Формируется привычка замечать хорошее.</div>'},
      { level:'Средний', text:'Возьмите на себя одно намерение на сегодня: при каждой возможности говорите партнёру что-то хорошее — конкретное, искреннее, настоящее. Не дежурное «молодец», а то, что вы действительно замечаете. Минимум три раза за день.', hint:'',
        why:'В кризисе внимание автоматически цепляется за раздражающее — это эволюционная защита, не злой умысел. День комплиментов — тренировка нового нейронного пути: «я выбираю замечать хорошее».',
        brain:'<div class="modal-item"><strong>Серотонин</strong> — выброс при произнесении и получении искренней похвалы у обоих</div><div class="modal-item"><strong>Окситоцин</strong> — атмосфера тепла и принятия запускает химию близости</div><div class="modal-item"><strong>Префронтальная кора</strong> — намеренный поиск позитивного тренирует нейронные пути оптимизма</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> соотношение 5:1 — главный предиктор стабильности пары.</div><div class="modal-section"><strong>Терапия принятия и ответственности:</strong> осознанный выбор реакции вместо автоматического.</div><div class="modal-result">Вы сами удивитесь, сколько хорошего есть рядом. Один день может стать началом нового способа быть вместе.</div>'},
      { level:'Лёгкий', text:'Обнимите партнёра и не отпускайте ровно 20 секунд. Не похлопывайте по спине. Просто держите. Почувствуйте его дыхание.', hint:'',
        why:'20 секунд — пороговое время, после которого объятие перестаёт быть «вежливым» и становится настоящим. Именно в этот момент тело расслабляется и начинает доверять.',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — максимально выбрасывается при длительном удерживающем объятии (исследования Университета Карнеги-Меллон)</div><div class="modal-item"><strong>Кортизол</strong> — падает на 15–25% после объятий дольше 10 секунд</div><div class="modal-item"><strong>Серотонин</strong> — стабилизируется, создавая ощущение спокойствия</div>',
        science:'<div class="modal-section"><strong>Нейробиология привязанности:</strong> кожный контакт активирует особые нервные волокна, связанные исключительно с социальным прикосновением.</div><div class="modal-section"><strong>Эмоционально-фокусированная терапия (Сью Джонсон):</strong> телесный контакт — прямой путь к эмоциональной регуляции партнёра.</div><div class="modal-result">Немедленное снижение напряжения. Восстановление базового ощущения физической безопасности рядом с партнёром.</div>'},
      { level:'Лёгкий', text:'Откройте телефон и найдите самое смешное или любимое совместное фото. Покажите друг другу. Расскажите: где это было, что происходило, что вы тогда чувствовали. Просто так — без повода.', hint:'',
        why:'Фотографии — это материальные якоря общей истории. Когда пара в кризисе, доступ к «нашим хорошим моментам» часто заблокирован болью. Это упражнение мягко открывает его через смех и конкретный образ.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — позитивные воспоминания активируют систему вознаграждения</div><div class="modal-item"><strong>Окситоцин</strong> — ностальгический образ «мы вместе и нам хорошо» запускает химию привязанности</div><div class="modal-item"><strong>Гиппокамп</strong> — обращение к позитивной памяти помогает «переписать» текущий негативный нарратив</div>',
        science:'<div class="modal-section"><strong>Вилдшут и Седикидес:</strong> совместная ностальгия снижает тревогу и укрепляет социальную связь.</div><div class="modal-section"><strong>Готтман:</strong> обращение к общей истории пары — один из ключевых инструментов восстановления близости.</div><div class="modal-result">Смех и тепло без усилий. Пара вспоминает, что они — ещё и «двое, которым было хорошо вместе».</div>'},
      { level:'Средний', text:'Включите песню, которую вы оба знаете. Протяните партнёру руку и потанцуйте один танец — прямо там, где стоите. Не нужно уметь танцевать. Нужно просто согласиться.', hint:'',
        why:'Танец — это синхронность тел, игра и лёгкость одновременно. Он возвращает в пространство, где нет «кто прав» и «кто виноват» — есть только движение вместе. Прямой путь к игровому режиму, который часто теряется в кризисе.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — музыка и движение дают двойной выброс</div><div class="modal-item"><strong>Окситоцин</strong> — физическая синхронность активирует систему привязанности</div><div class="modal-item"><strong>Зеркальные нейроны</strong> — подстройка движений друг к другу создаёт ощущение «мы заодно»</div>',
        science:'<div class="modal-section"><strong>Чирелли (2014):</strong> синхронные движения повышают просоциальное поведение и доверие.</div><div class="modal-section"><strong>Готтман:</strong> юмор и игривость — один из семи принципов счастливых отношений.</div><div class="modal-result">Разрядка напряжения через тело и смех. Восстановление игрового контакта — того, с которого обычно начинаются отношения.</div>'},
      { level:'Средний', text:'Сегодня, когда вы встретитесь дома — поцелуйте партнёра на 6 секунд. Не быстрый «клюв», а настоящий, неспешный поцелуй. Можно закрыть глаза.', hint:'',
        why:'Короткий ритуальный поцелуй — один из самых мощных «бидов для контакта» по Готтману. Он разрывает автопилот рутины и сигнализирует: «ты важен мне прямо сейчас». 6 секунд — минимум, при котором мозг перестаёт воспринимать прикосновение как фоновый шум.',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — резко выбрасывается при прикосновении губами, создаёт ощущение привязанности и безопасности</div><div class="modal-item"><strong>Дофамин</strong> — активируется предвкушение и новизна (даже в долгих отношениях)</div><div class="modal-item"><strong>Кортизол</strong> — снижается, стресс дня буквально «смягчается» физически</div>',
        science:'<div class="modal-section"><strong>Институт Готтмана:</strong> ежедневные ритуалы воссоединения — один из ключевых предикторов стабильности отношений.</div><div class="modal-section"><strong>Эмоционально-фокусированная терапия (Сью Джонсон):</strong> физический контакт как якорь эмоциональной безопасности.</div><div class="modal-result">Через 7–10 дней регулярной практики — ощутимое снижение эмоциональной дистанции.</div>'},
      { level:'Средний', text:'Договоритесь на один вечер: телевизор, телефоны и ноутбук — в сторону. Только вы двое. Можно просто сидеть, слушать музыку, играть в настольную игру. Главное — не прятаться за экраном.', hint:'',
        why:'Экраны стали главным способом избегания близости в современных парах. Убрать их — не наказание, а создание пространства, в котором контакт снова становится возможным. Пустота поначалу кажется неловкой — это нормально.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — перестаёт «утекать» в ленту соцсетей и возвращается в реальный контакт</div><div class="modal-item"><strong>Кортизол</strong> — снижается без информационного шума</div><div class="modal-item"><strong>Префронтальная кора</strong> — получает ресурс для присутствия и эмпатии</div>',
        science:'<div class="modal-section"><strong>Шерри Тёркл (Массачусетский технологический институт):</strong> постоянное присутствие телефона снижает глубину разговора даже при неиспользовании.</div><div class="modal-section"><strong>Готтман:</strong> качественное совместное время — ключевой предиктор удовлетворённости отношениями.</div><div class="modal-result">Первые 15 минут могут быть неловкими. После — пара начинает разговаривать. Просто так. Как раньше.</div>'},
      { level:'Средний', text:'Приготовьте партнёру то, что он любил в начале ваших отношений — или то, что готовили вам в детстве. Не обязательно идеально. Важно — что вы вспомнили.', hint:'',
        why:'Еда, приготовленная с заботой — один из древнейших языков привязанности. Этот жест говорит: «я помню, кто ты». Он обращается не к конфликту и не к проблемам, а к общей истории — туда, где вы ещё были близки.',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — вырабатывается через заботливое действие (не только получение, но и само приготовление для другого)</div><div class="modal-item"><strong>Серотонин</strong> — активируется через ощущение значимости и признания</div><div class="modal-item"><strong>Зеркальные нейроны</strong> — партнёр, видя вашу заботу, буквально «заражается» теплом</div>',
        science:'<div class="modal-section"><strong>Гэри Чэпмен:</strong> «акты служения» как первичный способ выражения близости (теория пяти языков любви).</div><div class="modal-section"><strong>Боулби:</strong> совместные ритуалы питания активируют паттерны безопасной привязанности.</div><div class="modal-result">Один такой жест может «разморозить» недели молчания. Создаёт точку опоры — момент, к которому пара может мысленно вернуться.</div>'},
      { level:'Средний', text:'Попросите партнёра сесть удобно. Возьмите его руки в свои и медленно, без спешки, сделайте 5-минутный массаж рук. Ничего не говорите — просто будьте в этом моменте.', hint:'',
        why:'Руки — одна из самых богатых нервными окончаниями частей тела. Медленное прикосновение к рукам партнёра — интимный, но безопасный жест: он не требует объяснений и не несёт угрозы отвержения.',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — максимально активируется при медленных, ритмичных прикосновениях</div><div class="modal-item"><strong>Кортизол</strong> — снижается у обоих — и у того, кто получает, и у того, кто делает</div><div class="modal-item"><strong>Парасимпатическая нервная система</strong> — переключается в режим «отдых и связь»</div>',
        science:'<div class="modal-section"><strong>Тиффани Филд (Институт изучения прикосновения, Университет Майами):</strong> регулярный тактильный контакт снижает тревожность у обоих партнёров.</div><div class="modal-section"><strong>Эмоционально-фокусированная терапия:</strong> телесный контакт как способ говорить без слов — особенно важно, когда слов нет.</div><div class="modal-result">Пара вспоминает, что прикосновение может быть просто заботой — без требований и ожиданий.</div>'},
      { level:'Лёгкий', text:'Создайте плейлист из 7–10 песен для партнёра. Те, что напоминают о нём, о вас, о моментах вместе — или просто те, что вы хотите, чтобы он услышал. Отправьте со словами: «Собрал(а) для тебя».', hint:'',
        why:'Музыка — это язык, когда слов не хватает. Плейлист говорит: «я думал(а) о тебе достаточно долго, чтобы собрать это». Каждая песня — маленький жест внимания, умноженный на количество треков.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — музыка активирует систему вознаграждения, особенно значимые треки</div><div class="modal-item"><strong>Окситоцин</strong> — совместный музыкальный опыт усиливает чувство связи</div><div class="modal-item"><strong>Лимбическая система</strong> — музыка напрямую активирует эмоциональную память, обходя рациональный контроль</div>',
        science:'<div class="modal-section"><strong>Дэниел Левитин:</strong> музыка — один из мощнейших индукторов эмоциональных состояний и социальной связи.</div><div class="modal-section"><strong>Готтман:</strong> разделение внутреннего мира партнёра — основа эмоциональной близости.</div><div class="modal-result">Партнёр получает 10 маленьких «я думал(а) о тебе». Плейлист можно слушать вместе — общий момент без усилий.</div>'},
      { level:'Средний', text:'Устройте свидание — дома. Накройте стол иначе, чем обычно. Оденьтесь чуть наряднее. Выключите верхний свет, включите свечи или гирлянду. Вы не «просто ужинаете» — вы на свидании.', hint:'',
        why:'Ритуал свидания — это намеренный выход из роли «соседей по квартире» и возвращение в роль «партнёров, которые выбирают друг друга». Смена контекста меняет восприятие — даже если всё происходит в той же комнате.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — ожидание, подготовка и новизна дают системный выброс</div><div class="modal-item"><strong>Окситоцин</strong> — ритуал совместного «особенного» времени укрепляет привязанность</div><div class="modal-item"><strong>Ретикулярная формация</strong> — мозг «переключает» режим восприятия через смену среды</div>',
        science:'<div class="modal-section"><strong>Артур Арон (университет штата Нью-Йорк):</strong> совместные новые и приятные активности восстанавливают уровень влюблённости в долгосрочных парах.</div><div class="modal-section"><strong>Когнитивно-поведенческая терапия:</strong> изменение действия меняет эмоциональное состояние.</div><div class="modal-result">Ощущение «мы ещё умеем быть интересны друг другу». Один такой вечер может перезапустить желание создавать совместные ритуалы.</div>'},
      { level:'Средний', text:'Вспомните: о чём партнёр просил вас последние месяцы — и что вы откладывали? Сделайте это сегодня. Без предупреждения. Не объясняйте — просто сделайте.', hint:'',
        why:'Невыполненные просьбы накапливаются в паре как молчаливые сигналы «ты не важен(на)». Выполнить одну из них — особенно внезапно — разрывает этот паттерн и говорит: «я слышу тебя. Я помню».',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — выброс при получении доказательства, что тебя слышали и помнили</div><div class="modal-item"><strong>Миндалина</strong> — снижает готовность к защитной реакции</div><div class="modal-item"><strong>Серотонин</strong> — ощущение, что твои потребности имеют значение, стабилизирует эмоциональный фон</div>',
        science:'<div class="modal-section"><strong>Когнитивно-поведенческая терапия:</strong> поведенческие эксперименты как способ опровергнуть убеждение «меня не слышат».</div><div class="modal-section"><strong>Готтман:</strong> реагирование на «биды для контакта» — ключевой показатель здоровья отношений.</div><div class="modal-result">Один поступок говорит больше, чем долгий разговор. Снижение накопленной обиды.</div>'},
      { level:'Средний', text:'Выберите что-то, что вы никогда не готовили вместе, — или что-то простое, но приготовьте это вдвоём. Распределите роли. Музыка в фоне. Никаких телефонов. Просто кухня, руки и вы.', hint:'',
        why:'Совместное создание чего-то — даже простого блюда — запускает командный режим. Пара перестаёт быть «двумя людьми с проблемами» и становится «двумя людьми, которые что-то делают вместе». Это смена роли — через действие.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — процесс совместного достижения активирует систему вознаграждения</div><div class="modal-item"><strong>Окситоцин</strong> — физическое соседство, передача предметов, случайные касания</div><div class="modal-item"><strong>Зеркальные нейроны</strong> — совместная работа создаёт ощущение «мы в одной команде»</div>',
        science:'<div class="modal-section"><strong>Артур Арон:</strong> совместные новые активности восстанавливают качество отношений.</div><div class="modal-section"><strong>Интегративная поведенческая парная терапия:</strong> создание позитивных совместных переживаний как основа терапевтического контракта.</div><div class="modal-result">«Помнишь, как мы тогда готовили?» — эпизодическая память, которая становится частью истории пары.</div>'},
      { level:'Средний', text:'Договоритесь на эту неделю: ложиться спать одновременно. Не смотреть в телефон в кровати. Просто лежать рядом — в тишине или разговаривая. Позвольте последним минутам дня принадлежать вам двоим.', hint:'',
        why:'Момент перед сном — один из самых уязвимых и открытых. Именно тогда снимаются дневные маски и приходят настоящие слова. Пары, которые ложатся вместе, имеют более высокое качество эмоционального контакта.',
        brain:'<div class="modal-item"><strong>Мелатонин + окситоцин</strong> — сочетание гормона сна и привязанности создаёт состояние особой открытости</div><div class="modal-item"><strong>Кортизол</strong> — минимален в вечернее время, снижает защитные реакции</div><div class="modal-item"><strong>Парасимпатическая система</strong> — активна перед сном, делает человека более восприимчивым к близости</div>',
        science:'<div class="modal-section"><strong>Венди Трокссел (2010):</strong> совместный отход ко сну коррелирует с более высокой удовлетворённостью отношениями и качеством сна у обоих.</div><div class="modal-section"><strong>Готтман:</strong> ритуалы воссоединения в конце дня — один из маркеров счастливых пар.</div><div class="modal-result">«Мы заканчиваем день вместе» постепенно становится якорем безопасности.</div>'},
      { level:'Глубокий', text:'Напишите партнёру письмо от руки. Не отправляйте сразу — дайте ему отлежаться день. Потом перечитайте и решите: отдать или оставить себе. Темы: за что вы благодарны, что цените, чего боитесь потерять.', hint:'',
        why:'Письмо замедляет мысль и даёт доступ к чувствам, которые в разговоре не успевают оформиться. Написание — это уже терапевтический акт: вы встречаетесь с собой прежде, чем с партнёром.',
        brain:'<div class="modal-item"><strong>Префронтальная кора</strong> — активируется при письменной рефлексии, снижая реактивность миндалины</div><div class="modal-item"><strong>Серотонин</strong> — выброс при переживании благодарности во время письма</div><div class="modal-item"><strong>Интеграция нарратива</strong> — письмо помогает мозгу связать разрозненные переживания в единую историю</div>',
        science:'<div class="modal-section"><strong>Джеймс Пеннебейкер:</strong> экспрессивное письмо снижает тревожность и улучшает качество отношений.</div><div class="modal-section"><strong>Когнитивно-поведенческая терапия:</strong> когнитивная реструктуризация через письменную фиксацию.</div><div class="modal-section"><strong>Нарративная терапия:</strong> переписывание истории отношений.</div><div class="modal-result">Даже если письмо останется непрочитанным, оно уже сделало своё дело.</div>'},
      { level:'Глубокий', text:'Вспомните ваше первое свидание. Воссоздайте его — или хотя бы ключевые детали: то же место, похожая еда, та же музыка. Не нужно быть идеальным — важно намерение вернуться туда вместе.', hint:'',
        why:'Воссоздание начала отношений активирует ресурс «почему мы выбрали друг друга». В кризисе этот ресурс часто недоступен — он заблокирован накопившейся болью. Этот ритуал открывает к нему доступ через действие, а не через разговор.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — реактивация ранних воспоминаний запускает систему вознаграждения, связанную с периодом влюблённости</div><div class="modal-item"><strong>Окситоцин</strong> — ностальгия в паре усиливает чувство привязанности</div><div class="modal-item"><strong>Гиппокамп</strong> — обращение к позитивным воспоминаниям помогает «переписать» текущий нарратив</div>',
        science:'<div class="modal-section"><strong>Вилдшут и Седикидес:</strong> совместная ностальгия увеличивает социальную связность и снижает тревогу.</div><div class="modal-section"><strong>Артур Арон:</strong> воссоздание новизны начала отношений повышает удовлетворённость парой.</div><div class="modal-result">Возможность посмотреть на партнёра глазами того человека, который когда-то выбрал именно его. Это не иллюзия — это ресурс.</div>'}
    ]
  },

    cards: [
      { level:'Лёгкий', text:'Какой момент, проведённый с тобой, я вспоминаю чаще всего — и почему именно он?', hint:'Расскажи о конкретном моменте. Не об «отношениях вообще» — а об одном дне, одном вечере, одной минуте.',
        why:'Этот вопрос открывает доступ к позитивному фундаменту отношений — тому, что существует вне конфликта. Он не требует уязвимости, но уже создаёт тепло. Идеальная точка входа для пары, которая давно не говорила по-настоящему.',
        brain:'<div class="modal-item"><strong>Гиппокамп</strong> — активируется при обращении к эпизодической памяти, связанной с позитивным опытом</div><div class="modal-item"><strong>Дофамин</strong> — воспоминание о приятном вызывает частичное воспроизведение того же нейрохимического состояния</div><div class="modal-item"><strong>Окситоцин</strong> — рассказ о близком человеке с теплотой запускает систему привязанности у обоих</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> знание внутреннего мира партнёра — первый уровень Дома Звука отношений.</div><div class="modal-section"><strong>Позитивная психология (Селигман):</strong> намеренное обращение к позитивным воспоминаниям снижает негативный фильтр восприятия партнёра.</div><div class="modal-result">Партнёр слышит, что о нём помнят хорошее. Пара вспоминает, что у них есть общая история — не только проблемы.</div>'},
      { level:'Лёгкий', text:'Что в нашей жизни вместе тебе сейчас нравится больше всего — то, чем ты дорожишь?', hint:'Не то, что «должно» нравиться. А то, что на самом деле.',
        why:'В кризисе пара склонна видеть только то, что сломано. Этот вопрос намеренно переключает внимание на то, что живо и ценно. Он также даёт каждому партнёру информацию о том, что важно для другого прямо сейчас.',
        brain:'<div class="modal-item"><strong>Префронтальная кора</strong> — активируется при намеренном поиске позитивного, тренируя нейронные пути оптимизма</div><div class="modal-item"><strong>Серотонин</strong> — ощущение «у нас есть что-то хорошее» стабилизирует эмоциональный фон</div><div class="modal-item"><strong>Миндалина</strong> — снижает активность, когда разговор начинается с безопасного и позитивного</div>',
        science:'<div class="modal-section"><strong>Когнитивно-поведенческая терапия:</strong> намеренная фиксация хорошего разрушает когнитивное искажение «всё плохо».</div><div class="modal-section"><strong>Готтман:</strong> соотношение 5:1 начинается с умения замечать хорошее, а не только проблемы.</div><div class="modal-result">Оба партнёра получают ресурс — осознание того, что есть ценное. Снижается катастрофизация.</div>'},
      { level:'Лёгкий', text:'Когда ты чувствуешь, что тебя любят — что именно происходит? Что я делаю или говорю, и ты думаешь: «да, вот оно»?', hint:'Конкретно. Не «когда ты добрый» — а что именно.',
        why:'Большинство конфликтов в парах — это не отсутствие любви, а несовпадение языков её выражения. Один дарит подарки, другой ждёт слов. Этот вопрос помогает напрямую, без обид, сказать: «вот как я чувствую любовь».',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — осознание и называние своих потребностей в безопасной обстановке снижает тревогу привязанности</div><div class="modal-item"><strong>Префронтальная кора</strong> — вербализация потребностей переводит их из импульсивной зоны в осознанную</div><div class="modal-item"><strong>Зеркальные нейроны</strong> — партнёр, слушая, физически «примеряет» описанный опыт на себя</div>',
        science:'<div class="modal-section"><strong>Гэри Чэпмен:</strong> теория пяти языков любви — слова признания, время, подарки, помощь, прикосновения. Пары часто «говорят» на разных языках не из равнодушия, а из незнания.</div><div class="modal-section"><strong>Эмоционально-фокусированная терапия (Сью Джонсон):</strong> прямое выражение потребностей — ключевой терапевтический навык.</div><div class="modal-result">Партнёр получает конкретное руководство — без телепатии и догадок. Растёт ощущение «меня понимают».</div>'},
      { level:'Средний', text:'Есть ли что-то, что тебя беспокоит или тяготит прямо сейчас — но ты не говоришь об этом, потому что не хочешь расстраивать меня или начинать ссору?', hint:'Можно говорить медленно. Можно не договаривать до конца. Я слушаю.',
        why:'Замалчивание — один из главных разрушителей близости. Не потому что человек скрытный, а потому что он заботится о партнёре или боится реакции. Этот вопрос создаёт явное разрешение говорить — и снимает ответственность за «инициацию конфликта».',
        brain:'<div class="modal-item"><strong>Миндалина</strong> — получает сигнал безопасности («меня не осудят»), снижая защитный барьер</div><div class="modal-item"><strong>Префронтальная кора</strong> — вербализация скрытого тревожного содержания снижает его эмоциональный заряд</div><div class="modal-item"><strong>Кортизол</strong> — хроническое замалчивание держит уровень стресса высоким; называние снижает его</div>',
        science:'<div class="modal-section"><strong>Эмоционально-фокусированная терапия (Сью Джонсон):</strong> невысказанные «вторичные эмоции» (раздражение, молчание) скрывают «первичные» (страх, боль, одиночество). Терапия начинается с доступа к первичным.</div><div class="modal-section"><strong>Джеймс Пеннебейкер:</strong> вербализация подавленного снижает физиологический стресс-ответ.</div><div class="modal-result">Выход наружу того, что давило изнутри. Партнёр, который слышит, получает шанс откликнуться — а не защищаться.</div>'},
      { level:'Средний', text:'Когда мы проводим время вместе — какое чувство у тебя чаще всего? Не «хорошо» или «плохо» — а точнее: спокойствие? Напряжение? Одиночество? Тепло?', hint:'Нет неправильного ответа. Любой ответ — это информация, которая мне важна.',
        why:'Этот вопрос — прямой путь к эмоциональному климату отношений. Он задаётся не через обвинение («ты меня игнорируешь»), а через собственное переживание — что делает его безопасным и принимаемым. Пара узнаёт правду без войны.',
        brain:'<div class="modal-item"><strong>Островок (инсула)</strong> — активируется при осознании телесных ощущений, связанных с эмоциями</div><div class="modal-item"><strong>Передняя поясная кора</strong> — участвует в эмоциональной регуляции и распознавании чужих состояний</div><div class="modal-item"><strong>Окситоцин</strong> — ощущение «меня спрашивают о моих чувствах» само по себе создаёт близость</div>',
        science:'<div class="modal-section"><strong>Эмоционально-фокусированная терапия:</strong> доступ к первичным эмоциям — фундамент терапии пар.</div><div class="modal-section"><strong>Дэниел Сигел:</strong> называние эмоции снижает её интенсивность («назови — и укроти»).</div><div class="modal-result">Оба партнёра получают редкую возможность — сказать правду о своём внутреннем состоянии без риска атаки.</div>'},
      { level:'Средний', text:'Бывает ли, что ты чувствуешь себя одиноким(ой) — даже когда мы вместе? Когда именно это происходит?', hint:'Это не упрёк. Это желание понять и быть ближе.',
        why:'Одиночество внутри отношений — одна из самых болезненных и при этом самых замалчиваемых тем. Назвать её — значит сделать первый шаг к тому, чтобы её преодолеть. Этот вопрос не обвиняет — он приглашает.',
        brain:'<div class="modal-item"><strong>Передняя поясная кора</strong> — одиночество активирует те же зоны боли, что и физическая боль (Айзенбергер, 2003)</div><div class="modal-item"><strong>Миндалина</strong> — хроническое ощущение невидимости держит её в состоянии тревоги</div><div class="modal-item"><strong>Окситоцин</strong> — сам факт того, что партнёр спрашивает и слышит, начинает «лечить» это одиночество</div>',
        science:'<div class="modal-section"><strong>Сью Джонсон:</strong> «Есть ли ты рядом? Важен ли я тебе?» — два базовых вопроса привязанности, лежащих под большинством конфликтов пар.</div><div class="modal-section"><strong>Мэтью Либерман:</strong> ощущение невидимости — физически болезненный опыт для мозга.</div><div class="modal-result">Называние одиночества — уже начало его исцеления. Даже одно «я не знал(а), что ты так себя чувствуешь» может изменить многое.</div>'},
      { level:'Средний', text:'Есть ли что-то, что я делаю или говорю, что причиняет тебе боль — возможно, даже не осознавая этого? Ты можешь сказать мне об этом — я хочу знать.', hint:'Говори о своём чувстве, а не о моей личности: «когда ты делаешь Х, я чувствую Y».',
        why:'Большинство ран в отношениях наносятся неосознанно. Этот вопрос создаёт структурированное, безопасное пространство для обратной связи — без обвинений и без защиты. Формат «я чувствую» вместо «ты всегда» — принципиален.',
        brain:'<div class="modal-item"><strong>Миндалина</strong> — при получении обратной связи в безопасном контексте не переходит в режим «атака/защита»</div><div class="modal-item"><strong>Префронтальная кора</strong> — остаётся включённой, позволяя слышать информацию, а не реагировать</div><div class="modal-item"><strong>Серотонин</strong> — ощущение контроля над разговором стабилизирует состояние</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> «мягкий старт разговора» — один из ключевых навыков здоровых отношений.</div><div class="modal-section"><strong>Когнитивно-поведенческая терапия:</strong> техника «я-высказываний» как замена обвинениям.</div><div class="modal-result">Информация, которая раньше копилась в обиде, выходит наружу — но не как атака, а как просьба.</div>'},
      { level:'Лёгкий', text:'Если бы ты мог(ла) выбрать — как будет выглядеть наша жизнь через три года? Что в ней есть, чего сейчас нет?', hint:'Не «реалистично» — а как ты хочешь. Мечта — это тоже информация.',
        why:'Пары в кризисе часто теряют общий горизонт — они живут «день за днём» в режиме выживания. Этот вопрос возвращает будущее в разговор. Он также даёт ценнейшую информацию: куда хочет идти партнёр.',
        brain:'<div class="modal-item"><strong>Префронтальная кора</strong> — активируется при планировании и представлении будущего</div><div class="modal-item"><strong>Дофамин</strong> — воображение желаемого будущего запускает систему вознаграждения</div><div class="modal-item"><strong>Сеть пассивного режима</strong> — мозг «путешествует» в воображаемое будущее, снижая зацикленность на текущем негативе</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> пары, у которых есть общий горизонт и разделённые смыслы, устойчивее.</div><div class="modal-section"><strong>Терапия принятия и ответственности:</strong> контакт с ценностями и желаемым будущим — один из столпов терапии.</div><div class="modal-result">Пара обнаруживает — или вспоминает — что у них есть куда идти вместе.</div>'},
      { level:'Средний', text:'Что тебе сейчас нужно от меня больше всего? Не вообще в жизни — а прямо сейчас, в эти дни?', hint:'Это может быть что угодно: тишина, объятие, разговор, пространство, помощь. Я спрашиваю — потому что хочу дать.',
        why:'Большинство людей не умеют прямо говорить о своих потребностях. Между тем именно непрямое их выражение — через капризы, молчание, претензии — разрушает отношения. Этот вопрос делает путь прямым.',
        brain:'<div class="modal-item"><strong>Префронтальная кора</strong> — вербализация потребности переводит её из импульсивного уровня в осознанный запрос</div><div class="modal-item"><strong>Окситоцин</strong> — ощущение «меня спрашивают, что мне нужно» создаёт немедленное ощущение заботы</div><div class="modal-item"><strong>Миндалина</strong> — снижает активность, когда потребность названа и услышана</div>',
        science:'<div class="modal-section"><strong>Эмоционально-фокусированная терапия (Сью Джонсон):</strong> прямое выражение потребностей — главный терапевтический навык в работе с парами.</div><div class="modal-section"><strong>Теория привязанности Боулби:</strong> базовая потребность — знать, что партнёр доступен и откликнется.</div><div class="modal-result">Партнёр перестаёт угадывать — и начинает знать. Тот, кто отвечает, чувствует себя нужным и способным помочь.</div>'},
      { level:'Средний', text:'Есть ли что-то в наших отношениях, что тебя пугает или тревожит? Что-то, о чём ты думаешь — и не знаешь, как сказать?', hint:'Я не собираюсь спорить. Я хочу понять, что у тебя внутри.',
        why:'Страхи внутри отношений — потерять партнёра, стать невидимым, оказаться недостаточным — часто управляют поведением, но никогда не называются напрямую. Этот вопрос даёт им имя. А то, что названо, теряет часть своей силы.',
        brain:'<div class="modal-item"><strong>Миндалина</strong> — активируется при страхе, но её реакция снижается при вербализации («назови — и укроти»)</div><div class="modal-item"><strong>Префронтальная кора</strong> — берёт контроль над реакцией, когда страх осознан и назван</div><div class="modal-item"><strong>Окситоцин</strong> — партнёр, который слышит страх без осуждения, становится «безопасной базой»</div>',
        science:'<div class="modal-section"><strong>Теория привязанности (Боулби, Эйнсворт):</strong> страх потери или отвержения — центральный двигатель поведения в близких отношениях.</div><div class="modal-section"><strong>Когнитивно-поведенческая терапия:</strong> экспозиция страха в безопасном контексте снижает его интенсивность.</div><div class="modal-result">Назвать страх в присутствии партнёра — один из самых мощных актов близости. Страх, услышанный без осуждения, теряет изолирующую силу.</div>'},
      { level:'Лёгкий', text:'В какие моменты ты чувствуешь себя собой — свободным(ой), живым(ой), настоящим(ой)? Что происходит в эти моменты?', hint:'Вспомни конкретную ситуацию, если можешь.',
        why:'Этот вопрос исследует то, что даёт человеку ощущение подлинности. Он раскрывает ценности: что для человека значит «быть собой». Может оказаться, что партнёру нужно личное пространство — и это абсолютно нормально.',
        brain:'<div class="modal-item"><strong>Сеть пассивного режима</strong> — активируется при размышлении о себе и своей идентичности</div><div class="modal-item"><strong>Серотонин</strong> — ощущение аутентичности и принятия связано с его устойчивым уровнем</div><div class="modal-item"><strong>Дофамин</strong> — воспоминание о состоянии потока и свободы запускает желание его воспроизвести</div>',
        science:'<div class="modal-section"><strong>Терапия принятия и ответственности:</strong> контакт с подлинным «я» и ценностями — основа психологического здоровья.</div><div class="modal-section"><strong>Деси и Райан:</strong> автономия — базовая психологическая потребность человека.</div><div class="modal-result">Партнёр узнаёт, в каких условиях другой чувствует себя живым. Близость не означает растворение — она означает пространство для обоих.</div>'},
      { level:'Средний', text:'Когда тебе плохо или тяжело — что ты хочешь, чтобы я делал(а)? А что я обычно делаю — и как это на тебя влияет?', hint:'Нет цели обидеть. Есть цель — понять, как быть рядом правильно.',
        why:'Один из главных источников боли в паре — когда партнёр «поддерживает не так». Один хочет объятий — другой начинает советовать. Этот вопрос устраняет эту пропасть напрямую.',
        brain:'<div class="modal-item"><strong>Зеркальные нейроны</strong> — узнать потребность другого — значит лучше на неё настроиться</div><div class="modal-item"><strong>Окситоцин</strong> — правильная поддержка (та, которую хочет получить партнёр) вызывает его выброс</div><div class="modal-item"><strong>Кортизол</strong> — «неправильная» поддержка (советы вместо принятия) может повышать стресс у получателя</div>',
        science:'<div class="modal-section"><strong>Каттрона:</strong> эффективность поддержки зависит не от её интенсивности, а от соответствия потребности получателя.</div><div class="modal-section"><strong>Готтман:</strong> «поворот к партнёру» в момент его уязвимости — критический момент доверия.</div><div class="modal-result">Оба партнёра получают конкретное знание: как помочь — и как случайно не сделать хуже.</div>'},
      { level:'Глубокий', text:'Есть ли что-то, что я сделал(а) или не сделал(а) — и что до сих пор тебе больно? Что ты, возможно, так и не высказал(а)?', hint:'Говори медленно. Я постараюсь услышать — не защититься.',
        why:'Невысказанные обиды — это хронические раны, которые заражают всё вокруг. Назвать обиду прямо — не значит начать войну. Это значит дать ей шанс зажить.',
        brain:'<div class="modal-item"><strong>Миндалина</strong> — хранит эмоциональную память об обидах; при их вербализации активность снижается</div><div class="modal-item"><strong>Префронтальная кора</strong> — берёт управление, когда обида осознана и названа, а не подавлена</div><div class="modal-item"><strong>Окситоцин</strong> — быть услышанным без осуждения вызывает его выброс у обоих</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> «непереработанные обиды» — один из главных факторов разрушения пары. Техника разбора боли после конфликта.</div><div class="modal-section"><strong>Эмоционально-фокусированная терапия:</strong> доступ к первичной эмоциональной ране — путь к исцелению связи.</div><div class="modal-result">Партнёр, которого слышат без защиты, часто сам становится мягче. Обиду не нужно «прорабатывать» до конца — достаточно, чтобы она была названа и услышана.</div>'},
      { level:'Глубокий', text:'Есть ли что-то важное обо мне — о том, как я устроен(а), что мне важно, через что я прохожу — что ты, кажется, не понимаешь или недооцениваешь?', hint:'Это не претензия. Это приглашение — войти глубже.',
        why:'Многие конфликты рождаются не из злого умысла, а из непонимания. «Ты не видишь меня» — один из самых болезненных опытов в отношениях. Этот вопрос открывает дверь к тому, что партнёр давно хотел объяснить, но не знал как.',
        brain:'<div class="modal-item"><strong>Правая префронтальная кора</strong> — активируется при попытке понять чужую субъективную реальность</div><div class="modal-item"><strong>Серотонин</strong> — ощущение «меня наконец поняли» даёт мощный стабилизирующий эффект</div><div class="modal-item"><strong>Передняя поясная кора</strong> — участвует в процессах эмпатии и принятия чужой точки зрения</div>',
        science:'<div class="modal-section"><strong>Питер Фонаги:</strong> теория ментализации — способность видеть партнёра как отдельного человека с его собственным внутренним миром.</div><div class="modal-section"><strong>Когнитивно-поведенческая терапия:</strong> когнитивная децентрация — взгляд на ситуацию с позиции другого.</div><div class="modal-result">Пара делает шаг из мира «я против тебя» в мир «я пытаюсь тебя понять».</div>'},
      { level:'Средний', text:'Каким(ой) партнёром ты хочешь быть — в идеале, если убрать усталость, обиды и страх? Что в тебе есть лучшего — что ты хочешь приносить в наши отношения?', hint:'Говори о себе, не обо мне.',
        why:'В кризисе люди часто застревают в роли «жертвы» или «обвиняемого». Этот вопрос возвращает человеку авторство — он не спрашивает «что не так», а спрашивает «каким(ой) ты хочешь быть». Это сдвиг от реактивности к намерению.',
        brain:'<div class="modal-item"><strong>Префронтальная кора</strong> — активируется при контакте с ценностями и намерениями</div><div class="modal-item"><strong>Дофамин</strong> — воображение себя в лучшей роли запускает мотивационную систему</div><div class="modal-item"><strong>Серотонин</strong> — ощущение внутреннего достоинства и авторства стабилизирует самооценку</div>',
        science:'<div class="modal-section"><strong>Терапия принятия и ответственности:</strong> действие в соответствии с ценностями, а не под давлением страха.</div><div class="modal-section"><strong>Нарративная терапия (Уайт и Эпстон):</strong> переписывание истории себя — от «я плохой партнёр» к «я хочу быть таким».</div><div class="modal-result">Человек выходит из защитной позиции и говорит о своих лучших намерениях. Тон разговора меняется с «разбора полётов» на «совместный проект».</div>'},
      { level:'Глубокий', text:'Как ты думаешь — что стоит между нами? Что не даёт нам быть так близко, как ты хотел(а) бы?', hint:'Говори не о человеке — а о том, что происходит между вами. Как будто это — третья сила в комнате.',
        why:'Вопрос «что мешает нам» переводит разговор из режима взаимных обвинений в режим совместного исследования. «Проблема» становится отдельным объектом — а не личностью партнёра.',
        brain:'<div class="modal-item"><strong>Префронтальная кора</strong> — метапозиция («смотрим на нас со стороны») активирует высшие когнитивные функции</div><div class="modal-item"><strong>Миндалина</strong> — снижает активность, когда «враг» — это паттерн, а не партнёр</div><div class="modal-item"><strong>Зеркальные нейроны</strong> — совместный анализ ситуации создаёт ощущение «мы в одной команде»</div>',
        science:'<div class="modal-section"><strong>Нарративная терапия (Майкл Уайт):</strong> «экстернализация проблемы» — один из главных терапевтических инструментов.</div><div class="modal-section"><strong>Эмоционально-фокусированная терапия:</strong> снижение эскалации через совместное называние паттерна.</div><div class="modal-result">Пара перестаёт сражаться друг с другом — и начинает смотреть в одном направлении.</div>'},
      { level:'Глубокий', text:'Если бы ты мог(ла) вернуть что-то одно из того, что было между нами раньше — что это было бы? Что ты скучаешь больше всего?', hint:'Это не о прошлом. Это о том, что тебе важно — прямо сейчас.',
        why:'Этот вопрос напрямую обращается к тому, что пара потеряла — и что она хочет восстановить. Он задаётся не через обвинение («ты стал(а) другим(ой)»), а через желание («я хочу снова это»). Это принципиальная разница.',
        brain:'<div class="modal-item"><strong>Гиппокамп</strong> — активируется при обращении к позитивным воспоминаниям об отношениях</div><div class="modal-item"><strong>Дофамин</strong> — желание вернуть что-то хорошее запускает мотивационную систему</div><div class="modal-item"><strong>Окситоцин</strong> — ностальгия по близости с конкретным человеком усиливает привязанность к нему</div>',
        science:'<div class="modal-section"><strong>Седикидес:</strong> ностальгия по отношениям укрепляет чувство связи и снижает тревогу.</div><div class="modal-section"><strong>Готтман:</strong> «позитивное переосмысление» истории отношений — важный элемент терапии.</div><div class="modal-result">Часто оказывается, что оба хотят одного и того же. Это одно из самых объединяющих открытий в разговоре.</div>'},
      { level:'Глубокий', text:'Если доверие между нами было подорвано — что тебе нужно, чтобы оно начало восстанавливаться? Не «чтобы всё было как раньше» — а первый маленький шаг.', hint:'Ответь честно. Даже если это кажется невозможным — скажи.',
        why:'Доверие не восстанавливается само по себе и не восстанавливается по требованию. Но оно восстанавливается через маленькие конкретные действия. Этот вопрос помогает перейти от абстрактного «я не доверяю» к конкретному «вот что могло бы помочь».',
        brain:'<div class="modal-item"><strong>Префронтальная кора</strong> — конкретизация доверия переводит разговор из эмоционального в рабочий режим</div><div class="modal-item"><strong>Миндалина</strong> — снижает уровень тревоги, когда появляется конкретный план, а не только боль</div><div class="modal-item"><strong>Окситоцин</strong> — маленькие подтверждения надёжности партнёра постепенно восстанавливают доверие</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> «доверие строится в маленьких моментах».</div><div class="modal-section"><strong>Михаэль Косфельд:</strong> окситоцин как нейрохимическая основа доверия — он требует реальных действий, а не слов.</div><div class="modal-result">Пара получает конкретный ориентир — что делать дальше. Не просто «мы поговорили», а «мы знаем, что попробовать».</div>'},
      { level:'Средний', text:'Каким(ой) ты видишь меня сейчас — как человека, не как партнёра? Что ты во мне замечаешь, что, может быть, я сам(а) в себе не вижу?', hint:'Говори с теплотой. Это не оценка — это взгляд.',
        why:'Мы часто не знаем, как нас видит самый близкий человек. Этот вопрос — редкая возможность получить взгляд со стороны — не критику, а внимательный, тёплый портрет.',
        brain:'<div class="modal-item"><strong>Серотонин</strong> — ощущение «меня видят и принимают» даёт мощный стабилизирующий эффект</div><div class="modal-item"><strong>Окситоцин</strong> — внимательный, позитивный взгляд партнёра активирует систему привязанности</div><div class="modal-item"><strong>Зеркальные нейроны</strong> — описание другого человека запускает у говорящего усиление эмпатии к нему</div>',
        science:'<div class="modal-section"><strong>Позитивная психология (Селигман):</strong> «замечание сильных сторон» другого человека — один из наиболее исследованных способов укрепить отношения.</div><div class="modal-section"><strong>Готтман:</strong> «восхищение и уважение» — фундамент здоровых отношений.</div><div class="modal-result">Человек слышит себя чужими — любящими — глазами. Говорящий обнаруживает, что у него ещё есть слова восхищения.</div>'},
      { level:'Глубокий', text:'Если представить, что мы справились — что между нами стало лучше — как выглядят наши отношения? Что в них есть? Как мы себя чувствуем?', hint:'Опиши в деталях. Как будто это уже случилось.',
        why:'Этот вопрос переключает с «что сломано» на «что возможно». Это техника «чудесного вопроса»: описать желаемое будущее так подробно, что оно становится ориентиром, а не фантазией.',
        brain:'<div class="modal-item"><strong>Префронтальная кора</strong> — активируется при детальном воображении желаемого будущего</div><div class="modal-item"><strong>Дофамин</strong> — конкретный образ желаемого запускает мотивацию двигаться к нему</div><div class="modal-item"><strong>Гиппокамп</strong> — создание нового «нарратива будущего» меняет восприятие настоящего</div>',
        science:'<div class="modal-section"><strong>Краткосрочная терапия, ориентированная на решение (де Шейзер):</strong> «чудесный вопрос» — один из наиболее исследованных инструментов.</div><div class="modal-section"><strong>Нейробиология надежды (Снайдер):</strong> наличие конкретного образа цели — один из ключевых факторов психологической устойчивости.</div><div class="modal-result">Пара получает общий образ — куда они идут. Это лучший финал разговора — и лучшее начало изменений.</div>'}
    ]
  },
  care: {
    label: 'ЗАБОТА',
    color: 'var(--light-accent)',
    cards: [
      { level:'Лёгкий', text:'Я смотрю на тебя — и мне хорошо.', hint:'Скажи это просто. Без повода. Пусть это будет правдой прямо сейчас.',
        why:'В рутине мы перестаём видеть партнёра — он становится «фоном». Эта фраза возвращает взгляд. Она говорит: «я вижу тебя. Прямо сейчас. И ты мне нравишься». Это один из самых простых и самых недооценённых актов близости.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — неожиданный комплимент вызывает всплеск, особенно если давно не звучал</div><div class="modal-item"><strong>Серотонин</strong> — ощущение принятия стабилизирует самооценку</div><div class="modal-item"><strong>Окситоцин</strong> — взгляд с восхищением активирует систему привязанности у обоих</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> «восхищение и уважение» — фундамент здоровых отношений, второй уровень Дома Звука.</div><div class="modal-section"><strong>Рейс и Шейвер:</strong> ощущение «меня видят» напрямую связано с удовлетворённостью отношениями.</div><div class="modal-result">Партнёр чувствует себя замеченным и желанным. Один взгляд и одна фраза могут изменить тон всего вечера.</div>'},
      { level:'Лёгкий', text:'Мне нравится, как ты смеёшься. Мне становится тепло на душе от этого.', hint:'Скажи это в момент, когда партнёр только что смеялся. Или просто вспомни — и скажи.',
        why:'Смех — одно из самых обезоруживающих проявлений человека. Сказать «мне нравится, как ты смеёшься» — значит сказать: «я замечаю тебя в моменты, когда ты живой(ая) и настоящий(ая)».',
        brain:'<div class="modal-item"><strong>Зеркальные нейроны</strong> — описание смеха партнёра частично воспроизводит его у говорящего</div><div class="modal-item"><strong>Дофамин</strong> — конкретная деталь активирует систему вознаграждения сильнее, чем общее «ты мне нравишься»</div><div class="modal-item"><strong>Окситоцин</strong> — совместный смех и его признание усиливают чувство связи</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> юмор и игривость — один из семи принципов счастливых отношений.</div><div class="modal-section"><strong>Роберт Провайн:</strong> совместный смех — один из мощнейших механизмов социального сближения.</div><div class="modal-result">Партнёр чувствует, что его живость — не помеха, а ценность. Это приглашение быть собой.</div>'},
      { level:'Лёгкий', text:'Я рада(д), что ты есть. Просто — что ты существуешь.', hint:'Не «спасибо за что-то». Просто — за то, что есть.',
        why:'Это самая базовая форма принятия — не «ты хорошо справляешься», не «ты мне помогаешь», а «я рада(д) что ты есть». Она не зависит от достижений, поведения или настроения. Это безусловное присутствие.',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — безусловное принятие вызывает его мощный выброс</div><div class="modal-item"><strong>Миндалина</strong> — снижает активность: угрозы нет, можно расслабиться</div><div class="modal-item"><strong>Серотонин</strong> — ощущение «я нужен(на) просто потому что я есть» — один из сильнейших стабилизаторов</div>',
        science:'<div class="modal-section"><strong>Боулби:</strong> безусловное принятие — основа безопасной привязанности.</div><div class="modal-section"><strong>Карл Роджерс:</strong> «безусловное позитивное отношение» как условие психологического здоровья.</div><div class="modal-result">Один из самых глубоко действующих комплиментов. Просто — тепло. Просто — принятие.</div>'},
      { level:'Средний', text:'Я вижу, как ты стараешься. И я ценю это.', hint:'Скажи это конкретно — о чём именно ты говоришь. Что именно ты заметил(а).',
        why:'Одна из главных болей в отношениях — «я стараюсь, но меня не замечают». Эта фраза напрямую закрывает эту боль. Она говорит: «твои усилия видны. Они имеют значение. Ты не невидимка».',
        brain:'<div class="modal-item"><strong>Серотонин</strong> — признание усилий даёт ощущение значимости и справедливости</div><div class="modal-item"><strong>Дофамин</strong> — позитивное подкрепление усиливает желание продолжать стараться</div><div class="modal-item"><strong>Миндалина</strong> — снижает тревогу «а вдруг я недостаточно хорош(а)»</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> усилия партнёра, которые остаются незамеченными, накапливаются в обиду.</div><div class="modal-section"><strong>Кэрол Двек:</strong> признание усилий (а не только результатов) формирует устойчивую мотивацию.</div><div class="modal-result">Партнёр чувствует: его труд виден. Противоядие от накопившейся обиды «меня не ценят».</div>'},
      { level:'Средний', text:'Рядом с тобой я чувствую себя дома. С тобой мне хорошо и я могу выдохнуть.', hint:'Скажи это тихо. Это не для громкого момента — это для обычного вечера.',
        why:'«Дом» — это метафора безопасной базы. Сказать это — значит сказать: «с тобой мне не нужно притворяться, защищаться, быть лучше чем я есть. Ты — место, где я могу быть собой». Это высшая форма близости.',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — ощущение безопасности рядом с конкретным человеком запускает его выброс</div><div class="modal-item"><strong>Кортизол</strong> — буквально снижается при присутствии «безопасной базы»</div><div class="modal-item"><strong>Парасимпатическая система</strong> — переключается в режим «отдых и связь», тело расслабляется</div>',
        science:'<div class="modal-section"><strong>Боулби:</strong> «безопасная база» — центральный конструкт теории привязанности.</div><div class="modal-section"><strong>Сью Джонсон:</strong> «Есть ли ты рядом?» — базовый вопрос привязанности.</div><div class="modal-result">Партнёр слышит: он не просто рядом — он место, где тебе хорошо. Один из самых глубоких комплиментов.</div>'},
      { level:'Лёгкий', text:'Ты делаешь мои дни лучше. Просто тем, что ты есть рядом.', hint:'Скажи это без повода — в обычный день. Именно тогда это звучит сильнее всего.',
        why:'Эта фраза — о влиянии. Она говорит партнёру: «твоё присутствие в моей жизни меняет её качество. Ты — не нейтральная переменная. Ты — плюс». В кризисе люди часто забывают, что они важны друг другу на этом базовом уровне.',
        brain:'<div class="modal-item"><strong>Дофамин</strong> — осознание, что ты положительно влияешь на жизнь другого, активирует систему вознаграждения</div><div class="modal-item"><strong>Серотонин</strong> — ощущение значимости и нужности стабилизирует эмоциональный фон</div><div class="modal-item"><strong>Окситоцин</strong> — признание позитивного влияния партнёра усиливает привязанность к нему</div>',
        science:'<div class="modal-section"><strong>Готтман:</strong> соотношение 5:1 — каждое позитивное взаимодействие важно.</div><div class="modal-section"><strong>Элгоу:</strong> выражение признательности укрепляет отношения сильнее, чем другие позитивные интервенции.</div><div class="modal-result">Партнёр слышит: он нужен. Не потому что «должен» — а потому что с ним лучше.</div>'},
      { level:'Лёгкий', text:'Мне нравится, когда ты рядом. Просто — физически. Когда ты в той же комнате.', hint:'Скажи это, когда вы просто находитесь вместе — читаете, смотрите что-то, молчите.',
        why:'Эта фраза ценна именно своей простотой — она не о великих чувствах, а о телесном присутствии. Она говорит: «я не хочу, чтобы тебя не было рядом. Твоё физическое присутствие — это уже хорошо».',
        brain:'<div class="modal-item"><strong>Окситоцин</strong> — физическая близость и её признание активируют систему привязанности</div><div class="modal-item"><strong>Парасимпатическая система</strong> — совместное присутствие переводит нервную систему в режим безопасности</div><div class="modal-item"><strong>Серотонин</strong> — ощущение «я нужен(на) просто так, без усилий» стабилизирует фон</div>',
        science:'<div class="modal-section"><strong>Джеймс Коан:</strong> физическое соседство с близким снижает уровень кортизола.</div><div class="modal-section"><strong>Теория привязанности:</strong> «поддерживающее присутствие» — один из базовых запросов привязанности.</div><div class="modal-result">Молчание перестаёт быть тягостным. Партнёр слышит: его присутствие — ценность, а не данность.</div>'},

      <div class="card-main">
        <div>
          <div class="card-level"><span class="level-pip ${levelClass}"></span>${card.level}</div>
          <div class="card-text">${card.text}</div>
        </div>
        ${card.hint ? `<div class="card-hint">${card.hint}</div>` : ''}
        <div class="card-num">${i + 1} / ${b.cards.length}</div>
      </div>`;
    track.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(dot);
  });
}

function goToCard(index) {
  const b = blocks[currentBlock];
  if (index < 0 || index >= b.cards.length) return;
  currentIndex = index;
  document.getElementById('cards-track').style.transform = `translateX(-${index * 100}%)`;
  document.querySelectorAll('.nav-dots .dot').forEach((d, i) => d.classList.toggle('active', i === index));
  closeModalSilent();
}

function showCards(block) {
  currentBlock = block;
  currentIndex = 0;
  buildCards(block);
  goToCard(0);
  document.getElementById('screen-blocks').style.display = 'none';
  document.getElementById('screen-card').style.display = 'flex';
  document.getElementById('info-buttons').style.display = 'flex';
  document.getElementById('btn-back').style.display = 'block';
}

function showBlocks() {
  document.getElementById('screen-blocks').style.display = 'flex';
  document.getElementById('screen-card').style.display = 'none';
  document.getElementById('info-buttons').style.display = 'none';
  document.getElementById('btn-back').style.display = 'none';
  closeModalSilent();
}

const container = document.getElementById('swipe-container');
container.addEventListener('touchstart', e => {
  if (document.getElementById('modal').classList.contains('open')) return;
  startX = e.touches[0].clientX;
  isDragging = true;
}, { passive: true });

container.addEventListener('touchend', e => {
  if (!isDragging) return;
  const diff = startX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 48) {
    if (diff > 0) goToCard(currentIndex + 1);
    else goToCard(currentIndex - 1);
  }
  isDragging = false;
}, { passive: true });

function openModal(type, btn) {
  const card = blocks[currentBlock].cards[currentIndex];
  const map = { why: ['Зачем это', card.why], brain: ['Что происходит в мозге', card.brain], science: ['Научная база', card.science] };
  document.getElementById('modal-title').textContent = map[type][0];
  document.getElementById('modal-body').innerHTML = map[type][1];
  document.getElementById('modal').classList.add('open');
  document.querySelectorAll('.btn-info').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalSilent();
}
function closeModalSilent() {
  document.getElementById('modal').classList.remove('open');
  document.querySelectorAll('.btn-info').forEach(b => b.classList.remove('active'));
}
</script>
</body>
</html>
