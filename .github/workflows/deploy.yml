name: Deploy - verevery.ru

on:
  workflow_dispatch:
  push:
    branches: [main, claude/fix-502-gateway-error-VuAwm]
    paths:
      - 'run.py'
      - 'requirements.txt'
      - 'app/**'
      - 'cards_*.json'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /opt/verevery/app/templates /opt/verevery/app/data"

      - name: Stop service
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "systemctl stop verevery || true"

      - name: Upload Flask app
        run: |
          scp -i ~/.ssh/id_rsa \
            run.py requirements.txt \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/verevery/

          scp -i ~/.ssh/id_rsa \
            app/__init__.py app/routes.py app/db.py \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/verevery/app/

          scp -i ~/.ssh/id_rsa \
            app/templates/base.html \
            app/templates/free.html \
            app/templates/buy.html \
            app/templates/buy_success.html \
            app/templates/cards.html \
            app/templates/auth.html \
            app/templates/offer.html \
            app/templates/privacy.html \
            app/templates/admin.html \
            app/templates/admin_login.html \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/verevery/app/templates/

          scp -i ~/.ssh/id_rsa \
            cards_action.json cards_question.json cards_care.json \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/verevery/app/data/

      - name: Install deps, update service, restart
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
            set -e
            cd /opt/verevery

            echo "=== Ensure virtualenv exists ==="
            if [ ! -f venv/bin/python ]; then
              python3 -m venv venv
            fi

            echo "=== Installing dependencies ==="
            venv/bin/pip install --upgrade pip --quiet
            venv/bin/pip install -r requirements.txt --quiet

            echo "=== Ensure .env exists with required keys ==="
            touch /opt/verevery/.env
            sed -i '/^ADMIN_PASSWORD=/d'      /opt/verevery/.env && echo "ADMIN_PASSWORD=Blizhe!2026" >> /opt/verevery/.env
            sed -i '/^YUKASSA_SECRET_KEY=/d'  /opt/verevery/.env && echo "YUKASSA_SECRET_KEY=live_zbwZGEcZ7i3YeTq3LDgTYzCrj-RtD8TSJCo4yk6kdxs" >> /opt/verevery/.env
            sed -i '/^RESEND_API_KEY=/d'      /opt/verevery/.env && echo "RESEND_API_KEY=re_QATPbfCi_EZBj5cxMRENr17YW23K7emkV" >> /opt/verevery/.env
            grep -q "BASE_URL"           /opt/verevery/.env || echo "BASE_URL=https://verevery.ru" >> /opt/verevery/.env
            grep -q "SHOP_ID"            /opt/verevery/.env || echo "SHOP_ID=1343976" >> /opt/verevery/.env

            echo "=== Fixing permissions ==="
            chown -R verevery:verevery /opt/verevery/app /opt/verevery/run.py /opt/verevery/requirements.txt \
              /opt/verevery/venv 2>/dev/null || true

            echo "=== Writing systemd service ==="
            printf '[Unit]\nDescription=verevery Flask app\nAfter=network.target\n\n[Service]\nUser=verevery\nGroup=verevery\nWorkingDirectory=/opt/verevery\nEnvironmentFile=/opt/verevery/.env\nExecStart=/opt/verevery/venv/bin/gunicorn -w 2 -b 127.0.0.1:8000 --access-logfile - --error-logfile - --log-level info run:app\nRestart=always\nRestartSec=3\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/verevery.service

            systemctl daemon-reload
            systemctl restart verevery
            sleep 5

            echo "=== Last 50 log lines ==="
            journalctl -u verevery -n 50 --no-pager

            echo "=== Test HTTP ==="
            curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ || echo "curl failed"

            echo "=== YuKassa: list registered webhooks ==="
            curl -s https://api.yookassa.ru/v3/webhooks \
              -u 1343976:live_zbwZGEcZ7i3YeTq3LDgTYzCrj-RtD8TSJCo4yk6kdxs

            echo "=== YuKassa: register webhook ==="
            curl -s -X POST https://api.yookassa.ru/v3/webhooks \
              -u 1343976:live_zbwZGEcZ7i3YeTq3LDgTYzCrj-RtD8TSJCo4yk6kdxs \
              -H 'Content-Type: application/json' \
              -d '{"event":"payment.succeeded","url":"https://verevery.ru/webhook/payment"}' || true
          ENDSSH
