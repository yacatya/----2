name: Deploy - verevery.ru

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'run.py'
      - 'requirements.txt'
      - 'app/**'
      - 'cards_*.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /opt/verevery/app/templates /opt/verevery/app/data /opt/verevery/app/static"

      - name: Stop service
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "systemctl stop verevery || true"

      - name: Upload Flask app
        run: |
          scp -i ~/.ssh/id_rsa \
            run.py requirements.txt \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/verevery/

          scp -i ~/.ssh/id_rsa \
            app/__init__.py app/routes.py app/db.py \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/verevery/app/

          scp -i ~/.ssh/id_rsa \
            app/templates/base.html \
            app/templates/free.html \
            app/templates/buy.html \
            app/templates/buy_success.html \
            app/templates/cards.html \
            app/templates/auth.html \
            app/templates/offer.html \
            app/templates/privacy.html \
            app/templates/admin.html \
            app/templates/admin_login.html \
            app/templates/admin_bloggers.html \
            app/templates/admin_bloggers_analytics.html \
            app/templates/admin_bloggers_templates.html \
            app/templates/partner_login.html \
            app/templates/partner_dashboard.html \
            app/templates/partner_sales.html \
            app/templates/partner_payments.html \
            app/templates/partner_guide.html \
            app/templates/admin_blogger_detail.html \
            app/templates/admin_placements.html \
            app/templates/admin_budget.html \
            app/templates/admin_telegram_setup.html \
            app/templates/admin_utm_analytics.html \
            app/templates/try.html \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/verevery/app/templates/

          scp -i ~/.ssh/id_rsa \
            cards_action.json cards_question.json cards_care.json \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/verevery/app/data/

      - name: Install deps, update service, restart
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
            set -e
            cd /opt/verevery

            echo "=== Installing dependencies ==="
            venv/bin/pip install -r requirements.txt --quiet

            echo "=== Ensure .env exists with required keys ==="
            touch /opt/verevery/.env
            sed -i '/^ADMIN_PASSWORD=/d' /opt/verevery/.env && echo "ADMIN_PASSWORD=Blizhe!2026" >> /opt/verevery/.env
            grep -q "BASE_URL"            /opt/verevery/.env || echo "BASE_URL=https://verevery.ru" >> /opt/verevery/.env
            grep -q "SHOP_ID"             /opt/verevery/.env || echo "SHOP_ID=1343976" >> /opt/verevery/.env
            grep -q "YUKASSA_SECRET_KEY"  /opt/verevery/.env || echo "YUKASSA_SECRET_KEY=live_Lgub-4R5c4GHQfzxuxemHpbUV2juR61Skwouf6X3J7o" >> /opt/verevery/.env
            grep -q "RESEND_API_KEY"      /opt/verevery/.env || echo "RESEND_API_KEY=re_U1LCNq9A_LyUSc2PuTFZTWfEkHXUQgQ55" >> /opt/verevery/.env
            grep -q "ANTHROPIC_API_KEY"   /opt/verevery/.env || echo "ANTHROPIC_API_KEY=" >> /opt/verevery/.env
            sed -i '/^WEBHOOK_SECRET=/d' /opt/verevery/.env && echo "WEBHOOK_SECRET=muzqxscBUUVIKPA_SshMQDWhXjuL1ESf" >> /opt/verevery/.env
            sed -i '/^ADMIN_NOTIFY_EMAIL=/d' /opt/verevery/.env && echo "ADMIN_NOTIFY_EMAIL=team.verevery@gmail.com" >> /opt/verevery/.env
            sed -i '/^REPLY_TO_EMAIL=/d' /opt/verevery/.env && echo "REPLY_TO_EMAIL=team.verevery@gmail.com" >> /opt/verevery/.env
            grep -q "META_VERIFY_TOKEN"       /opt/verevery/.env || echo "META_VERIFY_TOKEN=" >> /opt/verevery/.env
            grep -q "META_APP_SECRET"         /opt/verevery/.env || echo "META_APP_SECRET=" >> /opt/verevery/.env
            grep -q "INSTAGRAM_ACCESS_TOKEN"  /opt/verevery/.env || echo "INSTAGRAM_ACCESS_TOKEN=" >> /opt/verevery/.env
            grep -q "INSTAGRAM_USER_ID"       /opt/verevery/.env || echo "INSTAGRAM_USER_ID=" >> /opt/verevery/.env
            grep -q "TELEGRAM_BOT_TOKEN"      /opt/verevery/.env || echo "TELEGRAM_BOT_TOKEN=" >> /opt/verevery/.env
            grep -q "TELEGRAM_WEBHOOK_SECRET" /opt/verevery/.env || echo "TELEGRAM_WEBHOOK_SECRET=" >> /opt/verevery/.env
            sed -i '/^PROXY_URL=/d' /opt/verevery/.env && echo "PROXY_URL=http://68.209.61.111:8000" >> /opt/verevery/.env

            echo "=== Fixing permissions ==="
            chown -R verevery:verevery /opt/verevery/app /opt/verevery/run.py /opt/verevery/requirements.txt 2>/dev/null || true

            echo "=== Writing systemd service ==="
            printf '[Unit]\nDescription=verevery Flask app\nAfter=network.target\n\n[Service]\nUser=verevery\nGroup=verevery\nWorkingDirectory=/opt/verevery\nEnvironmentFile=/opt/verevery/.env\nExecStart=/opt/verevery/venv/bin/gunicorn -w 2 -b 127.0.0.1:8000 --access-logfile - run:app\nRestart=always\nRestartSec=3\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/verevery.service

            systemctl daemon-reload
            systemctl restart verevery
            sleep 5

            echo "=== Service status ==="
            systemctl status verevery --no-pager

            echo "=== Test HTTP ==="
            curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ || echo "curl failed"

            echo "=== Register YuKassa webhook ==="
            curl -s -X POST https://api.yookassa.ru/v3/webhooks \
              -u 1343976:live_Lgub-4R5c4GHQfzxuxemHpbUV2juR61Skwouf6X3J7o \
              -H 'Content-Type: application/json' \
              -d '{"event":"payment.succeeded","url":"https://verevery.ru/webhook/payment"}' || true
          ENDSSH
